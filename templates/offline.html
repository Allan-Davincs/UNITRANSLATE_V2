<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTranslate Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(145deg, #153943, #0b1f33);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #ecf7f7;
            padding: 16px;
        }
        .panel {
            max-width: 520px;
            background: rgba(245, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 14px;
            padding: 22px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
        }
        p {
            line-height: 1.5;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            color: #0b2b2a;
            background: #f8cc87;
            padding: 9px 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>You are offline</h1>
        <p>Cached parts of UniTranslate are available, but live translation needs an internet connection.</p>
        <a href="/">Try again</a>
    </div>
</body>
</html>
